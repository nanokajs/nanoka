name: Onboarding parity

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: onboarding-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  onboarding-happy-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run onboarding happy path E2E
        run: bash e2e/onboarding/scripts/run-onboarding.sh

  onboarding-zod4-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run onboarding zod@^4 regression E2E (expects typecheck failure)
        run: bash e2e/onboarding/scripts/run-onboarding-zod4.sh
