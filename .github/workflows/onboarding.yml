name: Onboarding parity

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: onboarding-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  onboarding-happy-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v4.4.0 / v5.0.0 (same commit)
        with:
          version: 9.15.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run onboarding happy path E2E
        run: bash e2e/onboarding/scripts/run-onboarding.sh

  onboarding-zod4-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v4.4.0 / v5.0.0 (same commit)
        with:
          version: 9.15.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run onboarding zod@^4 regression E2E (expects typecheck failure)
        run: bash e2e/onboarding/scripts/run-onboarding-zod4.sh

  onboarding-scaffold:
    name: Onboarding (scaffold)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v4.4.0 / v5.0.0 (same commit)
        with:
          version: 9.15.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: bash e2e/onboarding/scripts/run-onboarding-scaffold.sh
