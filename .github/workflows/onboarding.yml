name: Onboarding parity

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: onboarding-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  onboarding-happy-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0 / v5.0.0 (same commit)
        with:
          version: 9.15.9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run onboarding happy path E2E
        run: bash e2e/onboarding/scripts/run-onboarding.sh

  onboarding-zod4-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0 / v5.0.0 (same commit)
        with:
          version: 9.15.9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run onboarding zod@^4 regression E2E (expects typecheck failure)
        run: bash e2e/onboarding/scripts/run-onboarding-zod4.sh
