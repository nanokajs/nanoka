name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        shell: bash
        run: |
          if ! git branch -r --contains "${GITHUB_SHA}" | grep -qE "^\s*origin/main$"; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not on main branch."
            exit 1
          fi

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./packages/nanoka/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (=${TAG_VERSION}) does not match package.json version ${PKG_VERSION}."
            exit 1
          fi

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0 / v5.0.0 (same commit)
        with:
          version: 9.15.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - run: npm install -g npm@^11.5.1

      - run: pnpm install --frozen-lockfile

      - run: pnpm -C packages/nanoka build

      - run: pnpm -C packages/nanoka test

      - run: pnpm -C packages/nanoka typecheck

      - run: pnpm -C examples/basic typecheck

      - run: pnpm -C examples/basic test

      - name: Publish to npm
        working-directory: packages/nanoka
        run: npm publish --provenance
