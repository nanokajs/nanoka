name: Auto Tag

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

concurrency:
  group: tag-${{ github.sha }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./packages/nanoka/package.json').version")
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag if not exists
        id: create_tag
        run: |
          TAG="v${{ steps.version.outputs.value }}"
          if git tag -l "${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists, skipping."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "Created and pushed ${TAG}."
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger publish workflow
        if: steps.create_tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish.yml --ref "v${{ steps.version.outputs.value }}"
