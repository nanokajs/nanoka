name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0 / v5.0.0 (same commit)
        with:
          version: 9.15.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Verify LICENSE files are in sync
        run: |
          if ! diff -q LICENSE packages/nanoka/LICENSE >/dev/null; then
            echo "::error::LICENSE files at repository root and packages/nanoka/ are out of sync."
            echo "Both files must be byte-identical. Run: cp LICENSE packages/nanoka/LICENSE"
            diff LICENSE packages/nanoka/LICENSE || true
            exit 1
          fi

      - run: pnpm -C packages/nanoka build

      - run: pnpm -C packages/nanoka test

      - run: pnpm -C packages/nanoka typecheck

      - run: pnpm -C packages/nanoka-auth build

      - run: pnpm -C examples/basic typecheck

      - run: pnpm -C examples/basic test

      - run: pnpm lint
