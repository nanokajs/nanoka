name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0 / v5.0.0 (same commit)
        with:
          version: 9.15.9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Verify LICENSE files are in sync
        run: |
          if ! diff -q LICENSE packages/nanoka/LICENSE >/dev/null; then
            echo "::error::LICENSE files at repository root and packages/nanoka/ are out of sync."
            echo "Both files must be byte-identical. Run: cp LICENSE packages/nanoka/LICENSE"
            diff LICENSE packages/nanoka/LICENSE || true
            exit 1
          fi

      - run: pnpm -C packages/nanoka build

      - run: pnpm -C packages/nanoka test

      - run: pnpm -C packages/nanoka typecheck

      - run: pnpm -C examples/basic typecheck

      - run: pnpm -C examples/basic test

      - run: pnpm lint
